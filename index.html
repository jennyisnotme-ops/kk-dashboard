<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KK魔法學院 · 繪師人力儀表板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e99;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius:8px;--radius-lg:12px;
  --accent:#2563eb;--accent-light:#EFF6FF;--accent-text:#1d4ed8;
  --accent-btn:#2563eb;--accent-btn-text:#fff;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;
  --teal-bg:#E1F5EE;--teal-text:#085041;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --coral-bg:#FAECE7;--coral-text:#712B13;
  --pink-bg:#FBEAF0;--pink-text:#72243E;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#252523;--bg3:#2d2d2a;
  --text:#e8e8e4;--text2:#9e9e99;--text3:#6b6b67;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:18px;font-weight:600}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:8px 18px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.section{display:none}.section.active{display:block}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:flex-start;gap:12px}
.stat-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:2px}
.stat-num{font-size:24px;font-weight:600}
.stat-num.warn{color:#d97706}.stat-num.ok{color:#16a34a}.stat-num.accent{color:var(--accent)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.card-title{font-size:15px;font-weight:500}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--radius);font-size:12px;font-weight:500}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-teal{background:var(--teal-bg);color:var(--teal-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-gray{background:var(--gray-bg);color:var(--gray-text)}
.badge-purple{background:var(--purple-bg);color:var(--purple-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-coral{background:var(--coral-bg);color:var(--coral-text)}
.role-badge{display:inline-block;padding:2px 8px;border-radius:var(--radius);font-size:11px;font-weight:500}
.role-super{background:#FEF3C7;color:#78350f}
.role-editor{background:var(--blue-bg);color:var(--blue-text)}
.progress-bar{background:var(--bg2);border-radius:4px;height:7px;overflow:hidden;margin:8px 0 4px}
.progress-fill{height:100%;border-radius:4px;transition:width 0.4s}
.project-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow 0.15s}
.project-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.project-card-accent{height:3px;background:var(--accent)}
.project-card-body{padding:1rem 1.125rem 0.75rem}
.project-card-footer{padding:0.5rem 1.125rem 0.75rem;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.member-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.av-0{background:#DBEAFE;color:#1e40af}.av-1{background:#CCFBF1;color:#0f5132}
.av-2{background:#EDE9FE;color:#4c1d95}.av-3{background:#FFE4E6;color:#9f1239}
.av-4{background:#FEF3C7;color:#78350f}.av-5{background:#DCFCE7;color:#14532d}
.member-info{flex:1;min-width:0}
.member-name{font-size:14px;font-weight:500}
.member-tasks{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.load-bar{width:52px;height:5px;background:var(--bg2);border-radius:4px;overflow:hidden}
.load-ok{background:#22c55e}.load-warn{background:#f59e0b}.load-over{background:#ef4444}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;transition:border-color 0.15s,box-shadow 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 15%,transparent)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
.form-row{margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.btn{padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;background:transparent;color:var(--text);font-family:inherit;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent-btn);color:var(--accent-btn-text);border-color:var(--accent-btn);font-weight:500}
.btn-primary:hover{opacity:0.88}
.btn-outline{color:var(--accent);border-color:var(--accent)}
.btn-outline:hover{background:var(--accent-light)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:#dc2626;border-color:transparent}
.btn-danger:hover{background:#FEF2F2}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.tag-chip{display:inline-flex;align-items:center;gap:3px;background:var(--accent-light);color:var(--accent-text);border-radius:var(--radius);padding:2px 8px;font-size:11px;font-weight:500}
.tag-chip .rm{cursor:pointer;font-size:13px;opacity:0.6}
.tag-chip .rm:hover{opacity:1}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px;border:0.5px solid var(--border2);border-radius:var(--radius);min-height:38px;cursor:text;background:var(--bg)}
.assignee-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border-radius:var(--radius);padding:2px 8px;font-size:12px}
.assignee-tag .rm{cursor:pointer;color:var(--text2);font-size:14px;line-height:1}
.section-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:10px}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.empty{color:var(--text2);font-size:14px;padding:2rem;text-align:center}
.chip{font-size:11px;padding:2px 8px;border-radius:var(--radius);background:var(--bg2);color:var(--text2)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dl-near{color:#d97706}.dl-over{color:#dc2626}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:500}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);line-height:1;padding:0}
.auth-bar{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--radius-lg);font-size:13px;z-index:400;opacity:0;transition:opacity 0.25s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}.toast.error{background:#dc2626}
.divider{border:none;border-top:0.5px solid var(--border);margin:1rem 0}
.gantt-controls{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.gantt-controls select{width:auto}
.gantt-wrap{overflow-x:auto;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.gantt-inner{min-width:680px}
.gantt-head{display:flex;border-bottom:0.5px solid var(--border);padding-bottom:4px;margin-bottom:4px}
.gantt-name-col{width:140px;flex-shrink:0;font-size:12px;color:var(--text2);padding:0 8px}
.gantt-tl{flex:1;display:flex}
.gantt-month-label{font-size:11px;color:var(--text2);border-left:0.5px solid var(--border);text-align:center;padding:0 2px}
.gantt-row{display:flex;align-items:center;min-height:36px;border-bottom:0.5px solid var(--border)}
.gantt-row:last-child{border-bottom:none}
.gantt-row.sub{background:var(--bg2)}
.gantt-member{width:140px;flex-shrink:0;padding:0 8px;display:flex;align-items:center;gap:4px;font-size:13px}
.gantt-expand{cursor:pointer;font-size:11px;font-weight:500;color:var(--accent-text);background:var(--accent-light);border:none;padding:1px 5px;border-radius:4px;flex-shrink:0}
.gantt-bars{flex:1;position:relative;min-height:36px}
.g-bar{position:absolute;height:20px;top:8px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.g-today{position:absolute;top:0;bottom:0;width:1.5px;background:#ef4444;z-index:2;pointer-events:none}
.g-gridline{position:absolute;top:0;bottom:0;width:0.5px;background:var(--border);pointer-events:none}
.g-empty{font-size:12px;color:var(--text3);padding:0 8px;font-style:italic}
.group-sep{display:flex;align-items:center;background:var(--accent-light);padding:5px 8px;border-bottom:0.5px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-name{flex:1;font-size:14px;font-weight:500}
.log-row{display:flex;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;flex-wrap:wrap}
.log-row:last-child{border-bottom:none}
.log-time{color:var(--text3);font-size:11px;white-space:nowrap;min-width:130px}
.log-op{font-weight:500;color:var(--text)}
.log-action{color:var(--accent-text)}
.log-target{color:var(--text2);flex:1}
.other-note{display:none}.other-note.visible{display:block}
.dropdown-list{position:absolute;left:0;top:100%;z-index:50;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);margin-top:2px;max-height:150px;overflow-y:auto;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.dropdown-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.dropdown-item:hover{background:var(--accent-light);color:var(--accent-text)}
.auto-label{font-size:11px;color:var(--text2);margin-top:4px}
.archived-toggle{font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:12px;user-select:none}
.archived-toggle:hover{color:var(--text)}
.option-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.option-row:last-child{border-bottom:none}
.option-row input{flex:1;font-size:13px;padding:4px 8px}
.color-ball{width:26px;height:26px;border-radius:50%;background:conic-gradient(#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6,#ef4444);cursor:pointer;border:2px solid transparent;transition:transform 0.2s,box-shadow 0.2s;flex-shrink:0}
.color-ball:hover{transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.admin-tab{padding:7px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:color 0.15s}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.theme-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s}
.theme-btn.active{border-color:var(--text);transform:scale(1.15)}
</style>
</head>
<body>
<div class="app">
<div class="top-bar">
  <h1>繪師人力 &amp; 專案儀表板</h1>
  <div class="actions" id="editor-actions" style="display:none">
    <button class="btn btn-sm" onclick="openModal('member')">+ 新增組員</button>
    <button class="btn btn-sm btn-primary" onclick="openModal('project')">+ 新增專案</button>
    <button class="btn btn-sm" onclick="openModal('myaccount')" style="color:var(--text2)" id="btn-myaccount"></button>
    <button class="btn btn-sm" onclick="exportCSV()" style="color:var(--text2)">匯出 CSV</button>
    <button class="btn btn-sm" id="btn-admin" onclick="openModal('admin')" style="display:none">⚙️ 設定</button>
  </div>
</div>
<div class="auth-bar" id="auth-bar">
  <span style="color:var(--text2)">唯讀模式。</span>
  <input type="password" id="secret-input" placeholder="輸入密碼" style="width:180px" onkeydown="if(event.key==='Enter')tryAuth()"/>
  <button class="btn btn-sm btn-outline" onclick="tryAuth()">解鎖編輯</button>
  <span id="auth-status" style="font-size:12px;color:#dc2626"></span>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('overview',this)">總覽</button>
  <button class="tab" onclick="switchTab('projects',this)">專案列表</button>
  <button class="tab" onclick="switchTab('gantt',this)">甘特圖</button>
  <button class="tab" onclick="switchTab('members',this)">成員一覽</button>

</div>

<div id="sec-overview" class="section active">
  <div class="stat-row" id="stat-row"></div>
  <div class="two-col">
    <div><div class="section-title">即將截止（14天內）</div><div id="upcoming-list"></div></div>
    <div><div class="section-title">人力警示</div><div id="alert-list"></div></div>
  </div>
</div>

<div id="sec-projects" class="section">
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center">
    <input id="search-kw" placeholder="搜尋專案名稱或標籤…" style="width:220px;font-size:13px;padding:6px 10px" oninput="renderProjects()"/>
    <select id="filter-type" onchange="renderProjects()" style="width:auto;font-size:13px;padding:6px 10px">
      <option value="">所有類型</option>
      <option>訓練營</option><option>團練</option><option>月月繪</option>
      <option>DLC</option><option>正課</option><option>社群用</option><option>官網用</option><option>其他</option>
    </select>
    <select id="filter-status" onchange="renderProjects()" style="width:auto;font-size:13px;padding:6px 10px">
      <option value="">所有狀態</option>
      <option>進行中</option><option>待開始</option><option>審核中</option><option>完成</option><option>暫停</option>
    </select>
    <select id="sort-by" onchange="renderProjects()" style="width:auto;font-size:13px;padding:6px 10px">
      <option value="">預設排序</option>
      <option value="deadline">截止日↑</option>
      <option value="progress">進度↑</option>
      <option value="type">類型</option>
    </select>
  </div>
  <label class="archived-toggle" onclick="toggleArchived()">
    <span id="archived-icon">▶</span>
    顯示已完成專案（<span id="archived-count">0</span>）
  </label>
  <div class="project-grid" id="project-grid"></div>
  <div id="archived-section" style="display:none;margin-top:1rem">
    <div class="project-grid" id="archived-project-grid"></div>
  </div>
</div>

<div id="sec-gantt" class="section">
  <div class="gantt-controls">
    <div style="display:flex;align-items:center;gap:6px">
      <label style="margin:0;white-space:nowrap;font-size:13px;color:var(--text2)">顯示範圍</label>
      <select id="gantt-range" onchange="renderGantt()" style="width:120px">
        <option value="2">近 2 個月</option><option value="3" selected>近 3 個月</option>
        <option value="6">近 6 個月</option><option value="12">近 12 個月</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="margin:0;white-space:nowrap;font-size:13px;color:var(--text2)">篩選組別</label>
      <select id="gantt-group" onchange="renderGantt()" style="width:100px">
        <option value="all">全部</option><option value="A">A 組</option><option value="B">B 組</option>
      </select>
    </div>
    <div style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px">
      <span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px"></span>今天
    </div>
    <button class="btn btn-sm" onclick="loadData()" style="margin-left:auto">重新整理</button>
  </div>
  <div class="gantt-wrap"><div class="gantt-inner" id="gantt-container"></div></div>
</div>

<div id="sec-members" class="section">
  <div id="group-a-wrap"></div>
  <div id="group-b-wrap" style="margin-top:1.5rem"></div>
</div>

</div>

<!-- Member modal -->
<div id="modal-member" style="display:none" class="overlay">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title" id="member-modal-title">新增組員</span>
    <button class="close-btn" onclick="closeModal('member')">×</button>
  </div>
  <div class="form-grid">
    <div class="form-row"><label>姓名</label><input id="m-name" placeholder="例：小花"/></div>
    <div class="form-row"><label>所屬組別</label>
      <select id="m-group"></select></div>
  </div>
  <div class="form-grid">
    <div class="form-row"><label>國家</label>
      <select id="m-country"></select></div>
    <div class="form-row"><label>角色 / 職稱（選填）</label><input id="m-role" placeholder="例：資深繪師"/></div>
  </div>
  <div class="form-row"><label>備註（選填）</label><textarea id="m-note" rows="2" placeholder="例：兼職、請假中…"></textarea></div>
  <div class="form-row" style="position:relative">
    <label>標籤（最多5個）</label>
    <div class="tag-input-wrap" id="m-tag-box" onclick="document.getElementById('m-tag-input')&&document.getElementById('m-tag-input').focus()"></div>
    <div id="m-tag-dropdown" class="dropdown-list" style="display:none"></div>
  </div>
  <input type="hidden" id="m-edit-id"/>
  <div class="form-actions">
    <button class="btn" onclick="closeModal('member')">取消</button>
    <button class="btn btn-primary" onclick="saveMember()">儲存</button>
  </div>
</div>
</div>

<!-- Project modal -->
<div id="modal-project" style="display:none" class="overlay">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title" id="proj-modal-title">新增專案</span>
    <button class="close-btn" onclick="closeModal('project')">×</button>
  </div>
  <div class="form-row"><label>專案名稱</label><input id="p-name" placeholder="例：光影與色彩第18期"/></div>
  <div class="form-grid">
    <div class="form-row"><label>專案類型</label>
      <select id="p-type" onchange="toggleOtherNote()">
        <option>訓練營</option><option>團練</option><option>月月繪</option>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyW0S1ODLXtB1gsM2AD9aSvuCOmMHzf_zBeF2VRVmRaz0T9eChgbD605JWucl7bkIvr/exec';

let members=[],projects=[],selectedAssignees=[],editorSecret='',isEditor=false,currentRole='',currentUserName='';

let cbCounter=0,showArchived=false,expandedMembers={};
let mTags=[],pTags=[];

// ── 主題 ──────────────────────────────────────────────────
const THEMES=[
  {name:'深空藍',key:'blue',accent:'#2563eb',light:'#EFF6FF',text:'#1d4ed8',btn:'#2563eb'},
  {name:'森林綠',key:'green',accent:'#16a34a',light:'#F0FDF4',text:'#15803d',btn:'#16a34a'},
  {name:'暖橘',key:'amber',accent:'#d97706',light:'#FFFBEB',text:'#b45309',btn:'#d97706'},
  {name:'紫色',key:'purple',accent:'#7c3aed',light:'#F5F3FF',text:'#6d28d9',btn:'#7c3aed'},
  {name:'玫瑰',key:'rose',accent:'#e11d48',light:'#FFF1F2',text:'#be123c',btn:'#e11d48'},
  {name:'深灰',key:'slate',accent:'#334155',light:'#F1F5F9',text:'#1e293b',btn:'#334155'},
];
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}}
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}
function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return'#'+f(0)+f(8)+f(4);
}
function applyTheme(accent,light,textColor,btn){
  const r=document.documentElement;
  r.style.setProperty('--accent',accent);r.style.setProperty('--accent-light',light);
  r.style.setProperty('--accent-text',textColor);r.style.setProperty('--accent-btn',btn);
  try{localStorage.setItem('kk_theme',JSON.stringify({accent,light,textColor,btn}));}catch(e){}
}
function applyCustomColor(hex){
  const[h,s,l]=hexToHsl(hex);
  const light=hslToHex(h,Math.max(0,s-10),Math.min(97,l+45));
  const textColor=hslToHex(h,s,Math.max(5,l-15));
  applyTheme(hex,light,textColor,hex);
}
function loadSavedTheme(){
  try{const t=JSON.parse(localStorage.getItem('kk_theme'));if(t)applyTheme(t.accent,t.light,t.textColor,t.btn);}catch(e){}
}
function renderThemePresets(){
  const el=document.getElementById('theme-presets');
  el.innerHTML=THEMES.map(t=>`<div style="cursor:pointer;border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center" onclick="applyTheme('${t.accent}','${t.light}','${t.text}','${t.btn}');document.getElementById('custom-color-input').value='${t.accent}'" onmouseover="this.style.borderColor='${t.accent}'" onmouseout="this.style.borderColor='var(--border)'"><div style="width:28px;height:28px;border-radius:50%;background:${t.accent};margin:0 auto 6px"></div><div style="font-size:12px;color:var(--text2)">${t.name}</div></div>`).join('');
}

// ── JSONP ────────────────────────────────────────────────
function jsonpGet(url){
  return new Promise((resolve,reject)=>{
    const cb='__cb'+cbCounter++;
    window[cb]=(data)=>{delete window[cb];document.getElementById('jsonp-'+cb)?.remove();resolve(data);};
    const s=document.createElement('script');s.id='jsonp-'+cb;
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    s.onerror=()=>{delete window[cb];reject(new Error('JSONP 失敗'));};
    document.head.appendChild(s);
  });
}
async function apiCall(action,type,payload){
  const url=API_URL+'?action='+encodeURIComponent(action)+'&type='+encodeURIComponent(type)+'&secret='+encodeURIComponent(editorSecret)+'&payload='+encodeURIComponent(JSON.stringify(payload||{}));
  const data=await jsonpGet(url);if(data.error) throw new Error(data.error);return data;
}

// ── 日期格式 ────────────────────────────────────────────
function fmtDate(raw){
  if(!raw)return'';const d=new Date(raw);if(isNaN(d.getTime()))return String(raw);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}
function fmtDateInput(raw){
  if(!raw)return'';const d=new Date(raw);if(isNaN(d.getTime()))return String(raw);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

async function loadData(){
  showToast('載入中…');

    const data=await jsonpGet(API_URL);if(data.error)throw new Error(data.error);
    members=data.members||[];projects=data.projects||[];
    if(data.groups)sysGroups=data.groups;
    if(data.countries)sysCountries=data.countries;
    console.log('=== loadData ===');
    console.log('members:', JSON.stringify(members.map(m=>({name:m.name,group:m.group}))));
    console.log('projects count:', projects.length);
    render();showToast('資料已載入');
  }catch(e){showToast('載入失敗：'+e.message,true);}
}

function tryAuth(){
  const val=document.getElementById('secret-input').value.trim();
  if(!val){document.getElementById('auth-status').textContent='請輸入密碼';return;}
  editorSecret=val;
  // 驗證身份並取得 role（先嘗試列出帳號，若成功即取得 role）
  apiCall('list','users',{}).then(data=>{
    isEditor=true;
    const me=data.users&&data.users[0];
    currentRole=me?me.role:'editor';
    document.getElementById('auth-bar').style.display='none';
    document.getElementById('editor-actions').style.display='flex';
    currentUserName=me?me.name:'';
    document.getElementById('btn-myaccount').textContent='👤 '+(me?me.name:'我的帳號');
    document.getElementById('btn-admin').style.display='';
    showToast('已解鎖：'+(currentRole==='super_admin'?'超級管理者':'管理者'));render();
  }).catch(()=>{
    document.getElementById('auth-status').textContent='密碼錯誤';
    editorSecret='';
  });
}

// ── 帳號管理 ─────────────────────────────────────────────
async function loadUsers(){
  const wrap=document.getElementById('user-list-wrap');wrap.innerHTML='<div class="empty">載入中…</div>';
  try{
    const data=await apiCall('list','users',{});
    if(!data.users||!data.users.length){wrap.innerHTML='<div class="empty">無帳號</div>';return;}
    wrap.innerHTML=data.users.map(u=>`<div class="user-row">
      <div class="user-name">${u.name}</div>
      <span class="role-badge ${u.role==='super_admin'?'role-super':'role-editor'}">${u.role==='super_admin'?'超級管理者':'管理者'}</span>
      ${currentRole==='super_admin'?`
        <select onchange="changeUserRole(${u.idx},this.value)" style="width:auto;font-size:12px;padding:3px 6px">
          <option value="editor" ${u.role==='editor'?'selected':''}>管理者</option>
          <option value="super_admin" ${u.role==='super_admin'?'selected':''}>超級管理者</option>
        </select>
        <button class="btn btn-sm btn-danger" onclick="removeUser(${u.idx})">移除</button>`:''
      }
    </div>`).join('');
  }catch(err){wrap.innerHTML='<div class="empty" style="color:#dc2626">'+err.message+'</div>';}

async function addUser(){
  const name=document.getElementById('new-user-name').value.trim();

// ── 進度 ─────────────────────────────────────────────────
function calcProgress(start,deadline){
  if(!start||!deadline)return null;
  const s=new Date(start),e=new Date(deadline),t=new Date();
  s.setHours(0,0,0,0);e.setHours(0,0,0,0);t.setHours(0,0,0,0);
  if(t<=s)return 0;if(t>=e)return 100;
  return Math.round((t-s)/(e-s)*100);
}
function getProgress(p){
  if(p.progressOverride)return Number(p.progress)||0;
  const a=calcProgress(p.start,p.deadline);return a!==null?a:Number(p.progress)||0;
}
function updateAutoProgress(){
  const s=document.getElementById('p-start').value,d=document.getElementById('p-deadline').value;
  if(!document.getElementById('p-progress-override').checked){
    const a=calcProgress(s,d);
    document.getElementById('p-progress').value=a!==null?a:0;
    document.getElementById('auto-progress-label').textContent=a!==null?'依日期自動計算：'+a+'%':'填入起迄日後自動計算';
  }
}
function toggleProgressOverride(){
  const o=document.getElementById('p-progress-override').checked;
  const inp=document.getElementById('p-progress');
  inp.disabled=!o;inp.style.background=o?'var(--bg)':'var(--bg2)';
  if(!o)updateAutoProgress();
}

// ── 標籤 ─────────────────────────────────────────────────
function getAllTags(){
  const s=new Set();
  members.forEach(m=>(m.tags||[]).forEach(t=>s.add(t)));
  projects.forEach(p=>(p.tags||[]).forEach(t=>s.add(t)));
  return[...s];
}
function renderTagBox(boxId,dropId,tags,addFn,removeFn,inputId){
  const box=document.getElementById(boxId);box.innerHTML='';
  tags.forEach((t,i)=>{
    const chip=document.createElement('span');chip.className='tag-chip';
    chip.innerHTML=t+'<span class="rm" data-i="'+i+'">×</span>';
    chip.querySelector('.rm').onclick=()=>{removeFn(i);};box.appendChild(chip);
  });
  if(tags.length<5){
    const inp=document.createElement('input');inp.id=inputId;
    inp.placeholder=tags.length===0?'輸入標籤…':'';
    inp.style.cssText='border:none;padding:0;min-width:80px;flex:1;background:transparent;box-shadow:none;font-size:13px;color:var(--text)';
    inp.oninput=()=>{
      const q=inp.value;const dd=document.getElementById(dropId);
      if(!q){dd.style.display='none';return;}
      const sugg=getAllTags().filter(t=>t.includes(q)&&!tags.includes(t));
      if(!sugg.length){dd.style.display='none';return;}
      dd.innerHTML=sugg.map(t=>`<div class="dropdown-item" data-t="${t.replace(/"/g,'&quot;')}">${t}</div>`).join('');
      dd.querySelectorAll('.dropdown-item').forEach(el=>el.onclick=()=>{addFn(el.dataset.t);inp.value='';dd.style.display='none';});
      dd.style.display='block';
    };
    inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()){e.preventDefault();addFn(inp.value.trim());inp.value='';document.getElementById(dropId).style.display='none';}};
    box.appendChild(inp);
  }
}
function initMTagBox(){renderTagBox('m-tag-box','m-tag-dropdown',mTags,t=>{if(mTags.length<5&&!mTags.includes(t)){mTags.push(t);initMTagBox();}},i=>{mTags.splice(i,1);initMTagBox();},'m-tag-input');}
function initPTagBox(){renderTagBox('p-tag-box','p-tag-dropdown',pTags,t=>{if(pTags.length<5&&!pTags.includes(t)){pTags.push(t);initPTagBox();}},i=>{pTags.splice(i,1);initPTagBox();},'p-tag-input');}

// ── 工具 ─────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/864e5)}
function dlClass(d){const n=daysLeft(d);if(n===null)return'';if(n<0)return'dl-over';if(n<=14)return'dl-near';return''}
function dlLabel(d){if(!d)return'';const n=daysLeft(d);if(n===null)return'';if(n<0)return'逾期'+Math.abs(n)+'天';if(n===0)return'今天截止';return'還有'+n+'天'}
function avClass(name){const c=['av-0','av-1','av-2','av-3','av-4','av-5'];let h=0;for(let ch of name)h=(h*31+ch.charCodeAt(0))%c.length;return c[Math.abs(h)]}
function initials(name){return name?name.slice(0,2):'??'}
function badgeClass(s){const m={'進行中':'badge-blue','審核中':'badge-amber','完成':'badge-teal','暫停':'badge-gray','待開始':'badge-purple'};return m[s]||'badge-gray'}
function pColor(n){if(n>=80)return'#16a34a';if(n>=40)return'#d97706';return'#9ca3af'}
function loadCls(n){if(n<=2)return'load-ok';if(n<=4)return'load-warn';return'load-over'}

const TYPE_BADGE={'訓練營':'badge-blue','團練':'badge-teal','月月繪':'badge-purple','DLC':'badge-coral','正課':'badge-amber','社群用':'badge-green','官網用':'badge-gray','其他':'badge-gray'};
const BAR_COLORS=[{bg:'#DBEAFE',text:'#1e40af'},{bg:'#CCFBF1',text:'#134e4a'},{bg:'#EDE9FE',text:'#4c1d95'},{bg:'#FEF3C7',text:'#78350f'},{bg:'#FFE4E6',text:'#9f1239'},{bg:'#DCFCE7',text:'#14532d'}];

let toastTimer;
function showToast(msg,isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(isError?' error':'')+' show';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),isError?5000:2500);
}

async function saveProject(){

  const eid=document.getElementById('p-edit-id').value;

function editProject(id){

function filterAssignees(q){

  if(!f.length){dd.style.display='none';return;}

function addAssignee(id){

  document.getElementById('assignee-dropdown').style.display='none';renderAssigneeTags();

function removeAssignee(id){selectedAssignees=selectedAssignees.filter(a=>a!==id);renderAssigneeTags();}
function renderAssigneeTags(){
  const box=document.getElementById('assignee-box');box.innerHTML='';
  selectedAssignees.forEach(id=>{
    const m=members.find(x=>x.id===id);if(!m)return;

function renderSettingsEditors(){
  renderOptionEditor('groups-editor','groups',sysGroups);
  renderOptionEditor('countries-editor','countries',sysCountries);
}

function renderOptionEditor(containerId,key,options){
  const el=document.getElementById(containerId);if(!el)return;

async function saveOption(key,idx){
  const inp=document.getElementById('opt-'+key+'-'+idx);if(!inp)return;
  const val=inp.value.trim();if(!val){showToast('選項不能為空',true);return;}
  const arr=key==='groups'?[...sysGroups]:[...sysCountries];
  arr[idx]=val;
  await saveSettings(key,arr);
}

async function removeOption(key,idx){
  const arr=key==='groups'?[...sysGroups]:[...sysCountries];
  if(arr.length<=1){showToast('至少需要保留一個選項',true);return;}
  arr.splice(idx,1);
  await saveSettings(key,arr);
}

async function addOption(key){
  const inputId=key==='groups'?'new-group-input':'new-country-input';
  const inp=document.getElementById(inputId);if(!inp)return;
  const val=inp.value.trim();if(!val){showToast('請輸入選項名稱',true);return;}
  const arr=key==='groups'?[...sysGroups]:[...sysCountries];
  if(arr.includes(val)){showToast('此選項已存在',true);return;}
  arr.push(val);
  await saveSettings(key,arr);
  inp.value='';
}

  showToast('儲存中…');
  try{
    await apiCall('set','settings',{key,values});
    if(key==='groups')sysGroups=values;
    else sysCountries=values;
    renderSettingsEditors();
    showToast('已更新');
  }catch(e){showToast('失敗：'+e.message,true);}
}

function exportCSV(){
  const header=['專案名稱','類型','負責人','開始日','截止日','進度%','狀態','指派繪師','標籤','備註'];
  const rows=projects.map(p=>{
    const names=(p.assignees||[]).map(id=>{const m=members.find(x=>x.id===id);return m?m.name:'';}).filter(Boolean).join('|');
    return[p.name,p.type||'',p.owner||'',fmtDate(p.start),fmtDate(p.deadline),getProgress(p),p.status||'',names,(p.tags||[]).join('|'),p.note||''];
  });
  const csv=[header,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='KK儀表板_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ── Render ───────────────────────────────────────────────
function render(){renderStats();renderUpcoming();renderAlerts();renderProjects();renderMembers();}

function renderStats(){
  const el=document.getElementById('stat-row');
  const active=projects.filter(p=>p.status!=='完成').length;
  const done=projects.filter(p=>p.status==='完成').length;
  const over=projects.filter(p=>p.deadline&&daysLeft(p.deadline)<0&&p.status!=='完成').length;
  el.innerHTML=[['👥','總組員數',members.length,'accent','#EFF6FF'],['📋','進行中',active,'','#F0FDF4'],['✅','已完成',done,'ok','#DCFCE7'],['⚠️','逾期',over,over>0?'warn':'','#FEF9C3']].map(([icon,label,num,cls,bg])=>`<div class="stat"><div class="stat-icon" style="background:${bg}">${icon}</div><div><div class="stat-label">${label}</div><div class="stat-num ${cls}">${num}</div></div></div>`).join('');
}

function renderUpcoming(){
  const el=document.getElementById('upcoming-list');
  const list=projects.filter(p=>p.deadline&&daysLeft(p.deadline)>=0&&daysLeft(p.deadline)<=14&&p.status!=='完成').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  if(!list.length){el.innerHTML='<div class="empty">近14天沒有即將截止的專案</div>';return;}
  el.innerHTML=list.map(p=>{const prog=getProgress(p);return`<div class="card" style="padding:10px 1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="font-size:14px;font-weight:500">${p.name}</span>
      <span class="badge ${badgeClass(p.status)}">${p.status}</span>
    </div>
    ${p.owner?'<div style="font-size:11px;color:var(--text2);margin-top:3px">負責人：'+p.owner+'</div>':''}
    <div style="font-size:11px;margin-top:4px" class="${dlClass(p.deadline)}">${fmtDate(p.deadline)} · ${dlLabel(p.deadline)}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${pColor(prog)}"></div></div>
    <div style="font-size:11px;color:var(--text2)">${prog}% 完成</div>
  </div>`;}).join('');
}
function renderAlerts(){
  const el=document.getElementById('alert-list');let html='';
  members.forEach(m=>{
    const count=projects.filter(p=>p.status!=='完成'&&(p.assignees||[]).includes(m.id)).length;
    if(count>=4)html+=`<div class="card" style="padding:10px 1rem;border-left:3px solid #f59e0b;border-radius:0 var(--radius-lg) var(--radius-lg) 0"><div style="font-size:14px">${m.name} <span style="color:#d97706;font-weight:500">同時跑${count}個專案</span></div></div>`;
  });
  const idle=members.filter(m=>projects.filter(p=>p.status!=='完成'&&(p.assignees||[]).includes(m.id)).length===0);
  if(idle.length)html+=`<div class="card" style="padding:10px 1rem"><div style="font-size:13px;color:var(--text2)">目前無任務：${idle.map(m=>m.name).join('、')}</div></div>`;
  el.innerHTML=html||'<div class="empty">人力分配正常</div>';
}

function projectCard(p){
  const names=(p.assignees||[]).map(id=>{const m=members.find(x=>x.id===id);return m?m.name:null}).filter(Boolean);
  const typeKey=p.type?(p.type.split('：')[0]):'';
  const prog=getProgress(p);
  const sf=fmtDate(p.start),df=fmtDate(p.deadline);
  const editBtns=isEditor?`<button class="btn btn-sm btn-outline" onclick="editProject('${p.id}')">編輯</button><button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}')">刪除</button>`:'';
  const tagsHtml=(p.tags||[]).length?`<div class="chip-row" style="margin-top:6px">${(p.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>`:'';
  return`<div class="project-card">
    <div class="project-card-accent"></div>
    <div class="project-card-body">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div class="card-title">${p.name}</div>
          ${p.owner?'<div style="font-size:11px;color:var(--text2);margin-top:2px">負責人：'+p.owner+'</div>':''}
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
          ${p.type?'<span class="badge '+(TYPE_BADGE[typeKey]||'badge-gray')+'" style="font-size:11px;padding:2px 7px">'+p.type+'</span>':''}
          <span class="badge ${badgeClass(p.status)}">${p.status}</span>
        </div>
      </div>
      ${sf?'<div style="font-size:11px;color:var(--text2)">'+sf+(df?' → '+df:'')+'</div>':(df?'<div style="font-size:11px" class="'+dlClass(p.deadline)+'">'+df+' · '+dlLabel(p.deadline)+'</div>':(p.longterm?'<div style="font-size:11px;color:#6b7280;font-style:italic">∞ 長期持續中</div>':''))}
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${pColor(prog)}"></div></div>
      <div style="font-size:12px;color:var(--text2)">${prog}%${p.progressOverride?' (手動)':' (自動)'} 完成</div>
      ${names.length?'<div class="chip-row" style="margin-top:8px">'+names.map(n=>'<span class="chip">'+n+'</span>').join('')+'</div>':''}
      ${tagsHtml}
      ${p.note?'<div style="margin-top:8px;font-size:12px;color:var(--text2)">'+p.note+'</div>':''}
    </div>
    ${editBtns?'<div class="project-card-footer">'+editBtns+'</div>':''}
  </div>`;
}

function renderProjects(){
  const kw=(document.getElementById('search-kw').value||'').trim().toLowerCase();
  const ft=document.getElementById('filter-type').value;
  const fs=document.getElementById('filter-status').value;
  const sortBy=document.getElementById('sort-by').value;
  function applyFilters(list){
    if(kw)list=list.filter(p=>p.name.toLowerCase().includes(kw)||(p.tags||[]).some(t=>t.toLowerCase().includes(kw)));
    if(ft)list=list.filter(p=>p.type&&(p.type===ft||p.type.startsWith(ft)));
    if(fs)list=list.filter(p=>p.status===fs);
    if(sortBy==='deadline')list=[...list].sort((a,b)=>new Date(a.deadline||'9999')-new Date(b.deadline||'9999'));
    if(sortBy==='progress')list=[...list].sort((a,b)=>getProgress(a)-getProgress(b));
    if(sortBy==='type')list=[...list].sort((a,b)=>(a.type||'').localeCompare(b.type||''));
    return list;
  }
  let active=applyFilters(projects.filter(p=>p.status!=='完成'));
  let archived=applyFilters(projects.filter(p=>p.status==='完成'));
  document.getElementById('archived-count').textContent=archived.length;
  document.getElementById('project-grid').innerHTML=active.length?active.map(p=>projectCard(p)).join(''):'<div class="empty" style="grid-column:1/-1">沒有符合條件的專案</div>';
  document.getElementById('archived-project-grid').innerHTML=archived.length?archived.map(p=>projectCard(p)).join(''):'<div class="empty" style="grid-column:1/-1">沒有已完成的專案</div>';
}

function renderMembers(){
  renderGroup('A','group-a-wrap','A 組');renderGroup('B','group-b-wrap','B 組');
}
function renderGroup(group,elId,label){
  const el=document.getElementById(elId);
  const list=members.filter(m=>m.group===group);
  const addBtn=isEditor?`<button class="btn btn-sm btn-outline" onclick="openModal('member')" style="margin-left:8px">+ 新增</button>`:'';
  if(!list.length){el.innerHTML=`<div class="section-title">${label}（0人）${addBtn}</div><div class="empty">還沒有組員</div>`;return;}
  const rows=list.map(m=>{
    const projs=projects.filter(p=>p.status!=='完成'&&(p.assignees||[]).includes(m.id));
    const pct=Math.min(100,projs.length*20);
    const editBtns=isEditor?`<div style="display:flex;gap:4px;flex-shrink:0"><button class="btn btn-sm" onclick="editMember('${m.id}')">編輯</button><button class="btn btn-sm btn-danger" onclick="deleteMember('${m.id}')">移除</button></div>`:'';
    const tagsHtml=(m.tags||[]).length?`<div class="chip-row" style="margin-top:4px">${(m.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>`:'';
    return`<div class="member-row">
      <div class="avatar ${avClass(m.name)}">${initials(m.name)}</div>
      <div class="member-info">
        <div class="member-name">${m.name}${m.role?` <span style="font-size:11px;color:var(--text2);font-weight:400">${m.role}</span>`:''} ${m.country?`<span style="font-size:10px;background:var(--bg2);color:var(--text2);padding:1px 5px;border-radius:3px">${m.country}</span>`:''}</div>
        <div class="member-tasks">${projs.length?projs.map(p=>p.name).join('、'):'目前無任務'}</div>
        ${tagsHtml}
        ${m.note?'<div style="font-size:11px;color:var(--text2);margin-top:2px">'+m.note+'</div>':''}
      </div>
      <div style="text-align:right;margin-right:8px;flex-shrink:0">
        <div style="font-size:12px;color:var(--text2)">${projs.length}個專案</div>
        <div class="load-bar" style="margin-top:4px"><div class="${loadCls(projs.length)}" style="height:100%;border-radius:4px;width:${pct}%"></div></div>
      </div>
      ${editBtns}
    </div>`;
  }).join('');
  el.innerHTML=`<div class="section-title">${label}（${list.length}人）${addBtn}</div><div class="card">${rows}</div>`;
}

function renderGantt(){
  const container=document.getElementById('gantt-container');
  const rangeMonths=parseInt(document.getElementById('gantt-range').value)||3;
  const filterGroup=document.getElementById('gantt-group').value;
  const today=new Date();today.setHours(0,0,0,0);
  const rangeStart=new Date(today.getFullYear(),today.getMonth()-1,1);
  const rangeEnd=new Date(today.getFullYear(),today.getMonth()+rangeMonths,0);
  const totalDays=(rangeEnd-rangeStart)/864e5+1;
  function pct(d){return Math.max(0,Math.min(100,(d-rangeStart)/864e5/totalDays*100))}
  const fm=filterGroup==='all'?members:members.filter(m=>m.group===filterGroup);
  if(!fm.length){container.innerHTML='<div class="empty">沒有組員</div>';return;}
  const months=[];
  let cur=new Date(rangeStart.getFullYear(),rangeStart.getMonth(),1);
  while(cur<=rangeEnd){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  const mH=months.map(m=>{const s=new Date(m.getFullYear(),m.getMonth(),1),e=new Date(m.getFullYear(),m.getMonth()+1,0);return`<div class="gantt-month-label" style="width:${pct(e)-pct(s)}%;min-width:0">${m.getMonth()+1}月</div>`;}).join('');
  const tp=pct(today);
  const gl=months.map(mo=>`<div class="g-gridline" style="left:${pct(new Date(mo.getFullYear(),mo.getMonth(),1))}%"></div>`).join('');
  let rowsHtml='';
  ['A','B'].forEach(g=>{
    const gm=fm.filter(m=>m.group===g);if(!gm.length)return;
    if(filterGroup==='all')rowsHtml+=`<div class="group-sep"><span style="width:140px;flex-shrink:0;font-size:12px;font-weight:600;color:var(--accent-text)">${g} 組</span><div style="flex:1"></div></div>`;
    gm.forEach(m=>{
      const mP=projects.filter(p=>(p.assignees||[]).includes(m.id)&&p.status!=='完成'&&(p.start||p.deadline||p.longterm));
      const isExpanded=!!expandedMembers[m.id];const hasMulti=mP.length>1;
      const makeBar=p=>{
        const col=BAR_COLORS[projects.indexOf(p)%BAR_COLORS.length];
        // Long-term project: full-width gray bar
        if(p.longterm){
          return`<div class="g-bar" style="left:0%;width:100%;background:rgba(156,163,175,0.25);color:#6b7280;border:1px dashed rgba(156,163,175,0.6);font-style:italic" title="${p.name}（長期持續）">∞ ${p.name}</div>`;
        }
        const s=p.start?new Date(p.start):new Date(today.getFullYear(),today.getMonth()-1,1);
        const e=p.deadline?new Date(p.deadline):new Date(today.getFullYear(),today.getMonth()+rangeMonths,0);
        s.setHours(0,0,0,0);e.setHours(0,0,0,0);
        if(e<rangeStart||s>rangeEnd)return'';
        const left=pct(s),right=pct(e),width=Math.max(right-left,0.5);
        const startStr=p.start?fmtDate(p.start):'';
        const endStr=p.deadline?fmtDate(p.deadline):'';
        const dateRange=startStr&&endStr?startStr+' → '+endStr:startStr||endStr||'';
        const tooltipText=p.name+(dateRange?' ／ '+dateRange:'');
        return`<div class="g-bar" style="left:${left}%;width:${width}%;background:${col.bg};color:${col.text};${p.deadline&&daysLeft(p.deadline)<0?'border:1.5px solid #ef4444':''}" title="${tooltipText}">${p.name}</div>`;
      };
      const expandBtn=hasMulti?`<button class="gantt-expand" onclick="toggleGanttMember('${m.id}')">${isExpanded?'−':'+'}${mP.length}</button>`:'<span style="min-width:22px;display:inline-block"></span>';
      rowsHtml+=`<div class="gantt-row"><div class="gantt-member">${expandBtn}<div class="avatar ${avClass(m.name)}" style="width:26px;height:26px;font-size:11px;flex-shrink:0">${initials(m.name)}</div><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</span></div><div class="gantt-bars">${gl}<div class="g-today" style="left:${tp}%"></div>${mP[0]?makeBar(mP[0]):'<div class="g-empty">無任務</div>'}</div></div>`;
      if(isExpanded&&mP.length>1)mP.slice(1).forEach(p=>{
        rowsHtml+=`<div class="gantt-row sub"><div class="gantt-member"><span style="min-width:22px;display:inline-block"></span><span style="min-width:26px;display:inline-block"></span><span style="font-size:11px;color:var(--text2);padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span></div><div class="gantt-bars">${gl}<div class="g-today" style="left:${tp}%"></div>${makeBar(p)}</div></div>`;
      });
    });
  });
  container.innerHTML=`<div class="gantt-head"><div class="gantt-name-col"></div><div class="gantt-tl">${mH}</div></div>${rowsHtml}`;
}
function toggleGanttMember(id){expandedMembers[id]=!expandedMembers[id];renderGantt();}

document.addEventListener('click',e=>{
  if(!e.target.closest('.tag-input-wrap')&&!e.target.closest('.dropdown-list'))
    document.querySelectorAll('.dropdown-list').forEach(d=>d.style.display='none');
  const dd=document.getElementById('assignee-dropdown');
  if(dd&&!dd.contains(e.target)&&e.target.id!=='assignee-search')dd.style.display='none';
});

loadSavedTheme();
loadData();
</script>
